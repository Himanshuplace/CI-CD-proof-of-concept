apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-example-go-service
  namespace: argocd
spec:
  project: gnexlayer-services
  source:
    repoURL: 'https://gitlab.com/gnexlayer/gitops-config.git'
    targetRevision: main
    path: charts/go-service
    helm:
      valueFiles:
        - ../../environments/dev/services/example-go-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-example-go-service
  namespace: argocd
spec:
  project: gnexlayer-services
  source:
    repoURL: 'https://gitlab.com/gnexlayer/gitops-config.git'
    targetRevision: main
    path: charts/go-service
    helm:
      valueFiles:
        - ../../environments/staging/services/example-go-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-example-go-service
  namespace: argocd
  # finalizer: ArgoCD deletes the K8s resources when this Application is deleted.
  # Without this, deleting the ArgoCD app leaves orphaned pods/services.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gnexlayer-services
  source:
    repoURL: 'https://gitlab.com/gnexlayer/gitops-config.git'
    targetRevision: main
    path: charts/go-service
    helm:
      valueFiles:
        - ../../environments/production/services/example-go-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  # ── PRODUCTION: NO automated sync ─────────────────────────────────────────
  # Why no automated: {} here?
  #   In staging, ArgoCD auto-syncs every time CI pushes a new image tag.
  #   In production, a human must click "Sync" in the ArgoCD UI (or via CLI).
  #   This is the approval gate. It replaces the GitLab "when: manual" job
  #   because the deploy IS ArgoCD — not the pipeline.
  #
  # How to deploy to production:
  #   Option A (UI): ArgoCD dashboard → production-example-go-service → Sync
  #   Option B (CLI): argocd app sync production-example-go-service
  #   Option C (GitLab): add an argocd-sync CI job with `when: manual`
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground  # wait for old pods to terminate before creating new ones
