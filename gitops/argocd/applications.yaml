apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-example-go-service
  namespace: argocd
spec:
  project: gnexlayer-services
  source:
    repoURL: 'https://gitlab.com/gnexlayer/gitops-config.git'
    targetRevision: main
    path: charts/go-service
    helm:
      valueFiles:
        - ../../environments/dev/services/example-go-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
