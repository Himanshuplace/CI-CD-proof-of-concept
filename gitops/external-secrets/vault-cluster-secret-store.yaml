# ClusterSecretStore — one per cluster, shared by all ExternalSecrets
#
# This tells External Secrets Operator (ESO) HOW to connect to Vault.
# It's cluster-scoped so every namespace can use it.
#
# Prerequisite: Create the Vault token secret ONCE:
#   kubectl create secret generic vault-token \
#     --from-literal=token=$(vault token create -policy=external-secrets -format=json | jq -r .auth.client_token) \
#     -n external-secrets
#
# Two auth approaches:
#
# APPROACH A (this file) — Static token stored in K8s Secret
#   Simple. Token must be manually rotated. Fine for learning or small teams.
#   auth.tokenSecretRef → ESO reads the token from a K8s Secret
#
# APPROACH B (production-grade) — Kubernetes auth
#   ESO's ServiceAccount has a Vault role bound to it.
#   Vault validates the K8s SA JWT, issues a short-lived token automatically.
#   No manual rotation. Shown in docs/secrets-comparison.md.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # server: Vault's address. In-cluster Vault uses the K8s service DNS.
      # Format: http://<service>.<namespace>.svc.cluster.local:<port>
      # For external Vault (e.g. on your bare-metal server): https://vault.yourdomain.internal:8200
      server: "http://vault.vault.svc.cluster.local:8200"

      # path: The KV v2 mount path. Default Vault KV v2 is "secret".
      # Your secrets will be at: secret/data/gnexlayer/staging/...
      path: "secret"

      # version: "v2" = KV v2 engine (versioned secrets, recommended)
      # "v1" = legacy, no versioning
      version: "v2"

      auth:
        # tokenSecretRef: ESO reads the Vault token from this K8s Secret.
        # The K8s Secret named "vault-token" in namespace "external-secrets"
        # must exist and contain a key "token" with a valid Vault token.
        tokenSecretRef:
          namespace: external-secrets
          name: vault-token
          key: token
