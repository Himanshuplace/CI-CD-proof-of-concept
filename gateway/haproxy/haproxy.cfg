#───────────────────────────────────────────────────────────────────────────────
# HAProxy configuration
#
# Role: Edge load balancer that lives on the bare-metal server OUTSIDE Kubernetes.
# It terminates TCP connections, forwards to KrakenD, and health-checks KrakenD.
#
# Traffic path:
#   Client :80 → HAProxy → KrakenD :8080
#   Client :443 → HAProxy (TLS termination) → KrakenD :8080
#   Admin stats on :9000
#
# Why HAProxy instead of Nginx?
#   HAProxy: purpose-built LB, excellent health-check config, sticky sessions,
#            lower latency, better stats. Nginx is also fine but HAProxy is the
#            industry standard for high-performance load balancing.
#───────────────────────────────────────────────────────────────────────────────

global
    # Log to stdout so Docker/systemd captures it — no log file to rotate.
    log stdout format raw local0 info

    # Maximum simultaneous connections across all frontends.
    # 50000 is a safe default for a single-core VM.
    maxconn 50000

    # Security hardening: don't expose HAProxy version in error pages.
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull       # don't log empty health-check pings

    # If the upstream doesn't respond within 5s → 504 Gateway Timeout.
    # Tune per backend if some APIs are legitimately slow.
    timeout connect  5s
    timeout client   60s   # allow long-lived WebSocket connections
    timeout server   60s

    # Return a proper HTTP error page instead of a raw TCP reset.
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http

#───────────────────────────────────────────────────────────────────────────────
# Frontend: HTTP (port 80)
# In production, add: redirect scheme https code 301 if !{ ssl_fc }
# to force all HTTP → HTTPS. Commented out here for simplicity.
#───────────────────────────────────────────────────────────────────────────────
frontend http_front
    bind *:80

    # Add these headers so KrakenD (and your backends) know the real client IP.
    # Without this, your backend logs all show HAProxy's IP.
    option forwardfor
    http-request set-header X-Forwarded-Proto http

    # Route WebSocket upgrade requests to a separate backend that doesn't
    # timeout — WebSocket connections are long-lived.
    acl is_websocket hdr(Upgrade) -i websocket
    use_backend ws_backend if is_websocket

    default_backend krakend_backend

#───────────────────────────────────────────────────────────────────────────────
# Backend: KrakenD API gateway
# Multiple servers = round-robin load balancing.
# If you run only one KrakenD, this still works — just one server entry.
#───────────────────────────────────────────────────────────────────────────────
backend krakend_backend
    balance roundrobin

    # Health check: if /healthz returns 200, the server is UP.
    # HAProxy checks every 3s; 3 consecutive failures → DOWN.
    option httpchk GET /healthz
    http-check expect status 200

    # server <name> <host:port> check inter <interval> rise <up-after> fall <down-after>
    # inter  3s  — check every 3 seconds
    # rise   2   — mark as UP after 2 consecutive successes
    # fall   3   — mark as DOWN after 3 consecutive failures
    server krakend1 krakend:8080 check inter 3s rise 2 fall 3

    # To add a second KrakenD instance (high availability):
    # server krakend2 krakend2:8080 check inter 3s rise 2 fall 3

#───────────────────────────────────────────────────────────────────────────────
# Backend: WebSocket (long timeout, no health check pings that kill WS)
#───────────────────────────────────────────────────────────────────────────────
backend ws_backend
    balance roundrobin
    timeout tunnel 3600s  # allow WS connections up to 1 hour

    # WebSocket connections go directly to the Go service, bypassing KrakenD
    # because KrakenD has limited WebSocket support (passthrough only).
    # Adjust this host:port to match your K8s NodePort or LoadBalancer IP.
    server ws1 go-service:8080 check inter 10s

#───────────────────────────────────────────────────────────────────────────────
# Stats page — access at http://<server>:9000/stats
# Shows: requests/s, error rates, connection counts per backend
# In production: restrict access with ACLs or move behind VPN.
#───────────────────────────────────────────────────────────────────────────────
frontend stats
    bind *:9000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
