##─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — LOCAL DEVELOPMENT
#
# Mirrors the production architecture exactly:
#   HAProxy → KrakenD → Go service
#
# Run:   docker compose up --build
# Test:  curl http://localhost/api/v1/users
# Stats: http://localhost:9000/stats
# WS:    wscat -c ws://localhost/ws/live
#
# Note: This file uses the same image names as the CI pipeline.
#       In CI, images are built and pushed to the registry.
#       Locally, they're built on the fly by docker compose.
##─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Go service ──────────────────────────────────────────────────────────
  # This is what runs inside Kubernetes in staging/production.
  # Here it's just a Docker container — same image, different runtime.
  go-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP + WebSocket (direct access for debugging)
      - "9090:9090"   # gRPC (test with: grpcurl -plaintext localhost:9090 list)
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      LOG_LEVEL: "debug"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # ── 2. KrakenD API gateway ─────────────────────────────────────────────────
  # Sits between HAProxy and the Go service.
  # Config file is mounted — no custom Docker image needed.
  # In production you could bake the config into an image for immutability.
  krakend:
    image: devopsfaith/krakend:2.6
    volumes:
      - ./gateway/krakend/krakend.json:/etc/krakend/krakend.json:ro
    ports:
      - "8081:8080"   # KrakenD HTTP (8081 locally to avoid conflict with go-service)
      - "8090:8090"   # KrakenD metrics
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    depends_on:
      go-service:
        condition: service_healthy  # don't start until go-service passes healthcheck
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - internal
      - public

  # ── 3. HAProxy load balancer ───────────────────────────────────────────────
  # The only service exposed to the outside world.
  # Everything else is on the internal network.
  haproxy:
    image: haproxy:2.9-alpine
    volumes:
      - ./gateway/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"       # HTTP (main entry point)
      - "9000:9000"   # HAProxy stats page
    depends_on:
      krakend:
        condition: service_healthy
    networks:
      - public

networks:
  # internal: Go service and KrakenD — not reachable from outside
  internal:
    driver: bridge

  # public: HAProxy and KrakenD — HAProxy bridges the two networks
  public:
    driver: bridge
