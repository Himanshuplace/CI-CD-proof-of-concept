stages:
  - validate    # commitlint, branch naming, gofmt, vet, lint, secret scan
  - test        # unit tests + coverage gate
  - security    # gosec, govulncheck, trivy filesystem scan
  - build       # docker image build + push
  - package     # trivy image scan + sbom + cosign sign
  - deploy      # update gitops repo (ArgoCD picks it up)
  - observe     # smoke test + dora event + slack notification
  - agentic     # ai code review (advisory only)

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  GO_VERSION: "1.22"
  SERVICE_NAME: "$CI_PROJECT_NAME"
  COVERAGE_THRESHOLD: "75"
  DOCKERFILE_PATH: "Dockerfile"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/$SERVICE_NAME"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  GIT_DEPTH: "0"
  DOCKER_TLS_CERTDIR: "/certs"

.go-cache:
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod/
      - .cache/go-build/
  before_script:
    - mkdir -p .go/pkg/mod .cache/go-build
    - export GOPATH="$CI_PROJECT_DIR/.go"
    - export GOCACHE="$CI_PROJECT_DIR/.cache/go-build"

commitlint:
  stage: validate
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - npm install --silent @commitlint/cli @commitlint/config-conventional
  script:
    - npx commitlint --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to "$CI_COMMIT_SHA" --verbose

branch-name:
  stage: validate
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
  script:
    # Branch must be in the form <type>/<short-description>
    # Examples: feature/jwt-refresh, fix/nats-reconnect, hotfix/payment-nil-ptr
    #
    # If you adopt Jira/Linear tickets later, add the ticket ID requirement:
    #   ^(feature|fix|...)/[A-Z]+-[0-9]+-[a-z0-9-]+$
    # For now, ticket IDs are optional.
    - |
      echo "$CI_COMMIT_BRANCH" | grep -Eq '^(feature|fix|hotfix|chore|refactor|docs)/[a-z0-9-]+$'

format-vet-lint:
  stage: validate
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - !reference [.go-cache, before_script]
    - apk add --no-cache git curl
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - test -z "$(gofmt -l .)"
    - go vet ./...
    - golangci-lint run ./...

secret-scan:
  stage: validate
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-git --redact --verbose

unit-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - !reference [.go-cache, before_script]
    - apk add --no-cache git bc
  script:
    - go test -race -covermode=atomic -coverprofile=coverage.out ./...
    - |
      coverage="$(go tool cover -func=coverage.out | awk '/total:/ {gsub("%","",$3); print $3}')"
      echo "coverage=${coverage}% threshold=${COVERAGE_THRESHOLD}%"
      awk "BEGIN { exit !($coverage >= $COVERAGE_THRESHOLD) }"
  artifacts:
    when: always
    paths:
      - coverage.out
    expire_in: 7 days

gosec:
  stage: security
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - !reference [.go-cache, before_script]
    - apk add --no-cache git
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - gosec -fmt=json -out=gosec-report.json ./...
  artifacts:
    when: always
    paths:
      - gosec-report.json
    expire_in: 14 days

govulncheck:
  stage: security
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - !reference [.go-cache, before_script]
    - apk add --no-cache git
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - govulncheck ./...

trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

build-image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  needs:
    - unit-test
    - gosec
    - govulncheck
    - trivy-fs
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build --pull --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" --label "org.opencontainers.image.source=$CI_PROJECT_URL" -f "$DOCKERFILE_PATH" -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:$CI_COMMIT_TAG"
        docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
      fi

trivy-image:
  stage: package
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs:
    - build-image
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "$IMAGE_NAME:$IMAGE_TAG"

sbom-and-sign:
  stage: package
  image: alpine:3.20
  needs:
    - build-image
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
  script:
    - syft "$IMAGE_NAME:$IMAGE_TAG" -o spdx-json > sbom.spdx.json
    - cosign sign --yes "$IMAGE_NAME:$IMAGE_TAG"
    - cosign attach sbom --sbom sbom.spdx.json "$IMAGE_NAME:$IMAGE_TAG"
    - cosign attest --yes --predicate sbom.spdx.json "$IMAGE_NAME:$IMAGE_TAG"
  artifacts:
    paths:
      - sbom.spdx.json
    expire_in: 90 days

deploy-dev:
  stage: deploy
  image: alpine/git:latest
  needs:
    - build-image
    - trivy-image
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feature\//'
  before_script:
    - apk add --no-cache yq
  script:
    - git clone "https://deploy-bot:${GITOPS_DEPLOY_TOKEN}@${GITOPS_REPO_URL}" gitops-config
    - cd gitops-config
    - git config user.email "deploy-bot@gnexlayer.internal"
    - git config user.name "deploy-bot"
    - yq -i ".image.repository = \"$IMAGE_NAME\" | .image.tag = \"$IMAGE_TAG\"" "environments/dev/${GITOPS_SERVICE_PATH}/values.yaml"
    - git add "environments/dev/${GITOPS_SERVICE_PATH}/values.yaml"
    - git commit -m "chore(deploy): ${SERVICE_NAME} dev ${CI_COMMIT_SHORT_SHA} [skip ci]" || true
    - git push

deploy-staging:
  stage: deploy
  image: alpine/git:latest
  needs:
    - build-image
    - trivy-image
    - sbom-and-sign
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache yq
  script:
    - git clone "https://deploy-bot:${GITOPS_DEPLOY_TOKEN}@${GITOPS_REPO_URL}" gitops-config
    - cd gitops-config
    - git config user.email "deploy-bot@gnexlayer.internal"
    - git config user.name "deploy-bot"
    - yq -i ".image.repository = \"$IMAGE_NAME\" | .image.tag = \"$IMAGE_TAG\"" "environments/staging/${GITOPS_SERVICE_PATH}/values.yaml"
    - git add "environments/staging/${GITOPS_SERVICE_PATH}/values.yaml"
    - git commit -m "chore(deploy): ${SERVICE_NAME} staging ${CI_COMMIT_SHORT_SHA} [skip ci]" || true
    - git push

prepare-production:
  stage: deploy
  image: alpine/git:latest
  needs:
    - build-image
    - trivy-image
    - sbom-and-sign
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache yq
  script:
    - git clone "https://deploy-bot:${GITOPS_DEPLOY_TOKEN}@${GITOPS_REPO_URL}" gitops-config
    - cd gitops-config
    - git config user.email "deploy-bot@gnexlayer.internal"
    - git config user.name "deploy-bot"
    - yq -i ".image.repository = \"$IMAGE_NAME\" | .image.tag = \"$CI_COMMIT_TAG\"" "environments/production/${GITOPS_SERVICE_PATH}/values.yaml"
    - git add "environments/production/${GITOPS_SERVICE_PATH}/values.yaml"
    - git commit -m "chore(deploy): ${SERVICE_NAME} production ${CI_COMMIT_TAG} [skip ci]"
    - git push

# ── SMOKE TEST ─────────────────────────────────────────────────────────────
# Runs after deploy-staging. Hits the real staging URL to verify the new image
# is serving traffic before we record a DORA deployment event.
#
# Why: The GitOps push (deploy-staging) only updates a YAML file. ArgoCD then
# does the actual deploy. The smoke test waits until the service is alive.
# Without this, a failed deploy looks like a successful pipeline.
#
# STAGING_URL must be set as a GitLab CI variable:
#   e.g. https://staging.gnexlayer.internal
smoke-test-staging:
  stage: observe
  image: alpine:3.20
  needs:
    - deploy-staging
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache curl
  script:
    - |
      echo "Waiting for ArgoCD to sync (up to 120s)..."
      for i in $(seq 1 24); do
        response=$(curl -sf --max-time 5 "$STAGING_URL/healthz" 2>/dev/null || true)
        if echo "$response" | grep -q '"status":"ok"'; then
          echo "Staging is healthy after $((i*5))s"
          exit 0
        fi
        echo "  attempt $i/24 — not ready yet, waiting 5s..."
        sleep 5
      done
      echo "SMOKE TEST FAILED: staging did not become healthy within 120s"
      exit 1

track-dora:
  stage: observe
  image: alpine:3.20
  needs:
    - smoke-test-staging   # only record a deployment if smoke test passed
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST "$DORA_WEBHOOK_URL" \
        -H 'Content-Type: application/json' \
        -d "{
          \"event\":\"deployment\",
          \"service\":\"$SERVICE_NAME\",
          \"commit_sha\":\"$CI_COMMIT_SHA\",
          \"pipeline_id\":\"$CI_PIPELINE_ID\",
          \"environment\":\"staging\",
          \"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"commit_created_at\":\"$CI_COMMIT_TIMESTAMP\"
        }"

# ── SLACK NOTIFICATION ──────────────────────────────────────────────────────
# Sends a message to Slack after every successful staging deploy.
# SLACK_WEBHOOK_URL is a GitLab CI variable (masked).
#
# Why after_script instead of a separate job?
#   after_script runs even when the job fails — useful for failure notifications.
#   We have a separate notify-failure job for that case below.
notify-deploy:
  stage: observe
  image: alpine:3.20
  needs:
    - track-dora
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-Type: application/json' \
        -d "{
          \"text\": \":rocket: *$SERVICE_NAME* deployed to staging\",
          \"attachments\": [{
            \"color\": \"good\",
            \"fields\": [
              {\"title\": \"Commit\", \"value\": \"<$CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA|$CI_COMMIT_SHORT_SHA>\", \"short\": true},
              {\"title\": \"Author\", \"value\": \"$CI_COMMIT_AUTHOR\", \"short\": true},
              {\"title\": \"Message\", \"value\": \"$CI_COMMIT_MESSAGE\", \"short\": false},
              {\"title\": \"Pipeline\", \"value\": \"<$CI_PIPELINE_URL|#$CI_PIPELINE_ID>\", \"short\": true}
            ]
          }]
        }"

# ── FAILURE NOTIFICATION ────────────────────────────────────────────────────
# This job runs ONLY when the pipeline fails. Sends a Slack alert.
#
# Why a separate job and not after_script on every job?
#   after_script on individual jobs fires once per job failure — you'd get
#   spam if three jobs fail. This fires once per pipeline failure.
notify-failure:
  stage: observe
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_failure
    - if: '$CI_COMMIT_TAG'
      when: on_failure
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST "$SLACK_WEBHOOK_URL" \
        -H 'Content-Type: application/json' \
        -d "{
          \"text\": \":fire: *$SERVICE_NAME* pipeline FAILED\",
          \"attachments\": [{
            \"color\": \"danger\",
            \"fields\": [
              {\"title\": \"Branch\", \"value\": \"$CI_COMMIT_BRANCH\", \"short\": true},
              {\"title\": \"Commit\", \"value\": \"<$CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA|$CI_COMMIT_SHORT_SHA>\", \"short\": true},
              {\"title\": \"Pipeline\", \"value\": \"<$CI_PIPELINE_URL|#$CI_PIPELINE_ID>\", \"short\": false}
            ]
          }]
        }"

ai-review:
  stage: agentic
  image: python:3.12-slim
  # AI review costs API credits per run. For a small team shipping fast,
  # don't run it on every MR. Only run when sensitive paths are touched.
  # The team's human reviewers handle the rest.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/auth/**"
        - "**/payment/**"
        - "**/middleware/**"
        - "**/Dockerfile"
        - ".gitlab-ci.yml"
        - "ci-templates/**"
        - "charts/**"
        - "gitops/**"
        - "policies/**"
        - "**/go.mod"
        - "**/go.sum"
  before_script:
    - pip install --quiet anthropic python-gitlab
  script:
    - |
      python <<'PY'
      import os
      import subprocess

      import anthropic
      import gitlab

      def env(name):
          value = os.environ.get(name)
          if not value:
              raise RuntimeError(f"missing required env var: {name}")
          return value

      base = env("CI_MERGE_REQUEST_DIFF_BASE_SHA")
      diff = subprocess.check_output(["git", "diff", base, "HEAD"], text=True)[:50000]

      client = anthropic.Anthropic(api_key=env("ANTHROPIC_API_KEY"))
      review = client.messages.create(
          model=os.environ.get("ANTHROPIC_MODEL", "claude-sonnet-4-20250514"),
          max_tokens=2500,
          system=(
              "You are a senior Go and DevOps reviewer for a financial platform. "
              "Prioritize correctness, security, observability, idempotency, rollback safety, "
              "context propagation, SQL/tenant isolation, and production failure modes. "
              "Be concise. Separate blocking findings from advisory suggestions."
          ),
          messages=[{"role": "user", "content": f"Review this GitLab MR diff:\n\n{diff}"}],
      )

      gl = gitlab.Gitlab(env("CI_SERVER_URL"), private_token=env("GITLAB_TOKEN"))
      project = gl.projects.get(env("CI_PROJECT_ID"))
      mr = project.mergerequests.get(env("CI_MERGE_REQUEST_IID"))
      mr.notes.create({"body": "## AI Code Review\n\n" + review.content[0].text})
      PY
  allow_failure: true
