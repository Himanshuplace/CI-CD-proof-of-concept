nameOverride: ""

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  LOG_LEVEL: info
  DEBUG: "false"

secrets:
  enabled: true
  name: ""

probes:
  path: /healthz

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

